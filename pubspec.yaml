name: sensor_flutter
description: 传感器监测系统 - Flutter跨平台版本
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  dio: ^5.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 图表
  fl_chart: ^0.66.0
  
  # 二维码
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1
  
  # 时间处理
  intl: ^0.18.1
  
  # 下拉刷新
  pull_to_refresh: ^2.0.0
  
  # UI组件
  flutter_slidable: ^3.0.1
  
  # 权限
  permission_handler: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
